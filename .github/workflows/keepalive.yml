# Keeps the Supabase Free project from auto-pausing after 7 days of inactivity.
# Runs every 3 days and makes one tiny authenticated REST request.
# Add repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       = your project URL (https://xxxx.supabase.co)
#   SUPABASE_ANON_KEY  = your anon public key
name: supabase-keepalive

on:
  schedule:
    - cron: '17 6 */3 * *'   # every 3 days at 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL secret not set — skipping."; exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1")
          echo "REST responded: $code"
          # 200 (rows) or 401/406 (reachable but gated) all mean the project is awake
          if [ "$code" = "000" ]; then echo "unreachable"; exit 1; fi
